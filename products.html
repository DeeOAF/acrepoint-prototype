<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .bg-brand { background-color: #2B7F68; }
        .text-brand { color: #2B7F68; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border-color: #2B7F68; }
        .cart-show { transform: translate(-50%, 0) !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-white border-r border-gray-100 flex flex-col shrink-0 shadow-xl z-10">
        <div class="p-8 mb-4">
            <img src="https://i.imgur.com/mFfhdmw.png" alt="Acrepoint" class="w-30 mx-auto object-contain">
        </div>
        <nav class="flex-1 px-6 space-y-1">
            <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest ml-3 mb-2">Main Menu</p>
            <a href="index.html" class="flex items-center p-4 text-gray-500 rounded-2xl transition-all hover:bg-gray-50">
                <span class="mr-3 text-xl">🌱</span> Impact Dashboard
            </a>
            <a href="#" class="flex items-center p-4 bg-emerald-50 text-brand rounded-2xl font-black shadow-sm">
                <span class="mr-3 text-xl">🛍️</span> Product Catalog
            </a>
            <a href="reservations.html" class="flex items-center p-4 text-gray-500 rounded-2xl transition-all hover:bg-gray-50">
                <span class="mr-3 text-xl">📅</span> Reservations
            </a>
        </nav>
        <div class="p-6 border-t border-gray-50">
            <p class="text-[9px] text-center text-gray-300 font-bold tracking-widest uppercase">Acrepoint POS v1.0.4</p>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-12 pb-48">
        <header class="flex justify-between items-start mb-12">
            <div>
                <h1 class="text-4xl font-black text-gray-900 tracking-tight">Product Catalog</h1>
                <p class="text-gray-500 font-medium text-sm mt-1">Nairobi CBD • <span class="text-brand font-bold">420 SKUs</span> In Stock</p>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="bg-white px-6 py-3 rounded-[2rem] shadow-sm border border-brand/20 flex items-center">
                    <div class="mr-4 text-right">
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Active Session</p>
                        <p id="activeFarmerName" class="text-sm font-black text-brand uppercase tracking-tighter">Guest Farmer</p>
                    </div>
                    <div id="starIndicator" class="w-10 h-10 bg-brand rounded-2xl flex items-center justify-center text-white text-lg shadow-inner">👤</div>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 mb-10">
            <div class="flex-1 relative">
                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-xl opacity-40">🔍</span>
                <input type="text" placeholder="Search products, brands or SKU..." class="w-full pl-14 pr-6 py-5 bg-white border border-gray-100 rounded-[2rem] shadow-sm focus:outline-none focus:ring-4 focus:ring-brand/5 focus:border-brand transition-all font-medium">
            </div>
            <select class="bg-white border border-gray-100 rounded-[2rem] px-8 py-5 font-black text-[11px] uppercase tracking-widest text-gray-500 shadow-sm cursor-pointer outline-none focus:border-brand">
                <option>All Categories</option>
                <option>Fertilizers</option>
                <option>Hybrid Seeds</option>
                <option>Crop Protection</option>
                <option>Tools</option>
            </select>
        </div>

        <div id="gridView" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            </div>
    </main>

    <div id="cartBar" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/95 backdrop-blur-xl w-full max-w-3xl p-6 rounded-[3rem] shadow-2xl flex justify-between items-center border border-white/10 translate-y-64 transition-all duration-700 ease-[cubic-bezier(0.23,1,0.32,1)] z-50">
        <div class="flex items-center space-x-10 pl-6">
            <div class="relative">
                <span class="text-3xl">🛒</span>
                <span id="cartBadge" class="absolute -top-2 -right-3 bg-brand text-white text-[10px] font-black px-2 py-1 rounded-full border-2 border-gray-900">0</span>
            </div>
            <div class="flex flex-col">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Cart Total</p>
                <p class="text-3xl font-black text-white tracking-tighter" id="cartTotalDisplay">KES 0</p>
            </div>
        </div>
        <button onclick="window.location.href='checkout.html'" class="bg-brand text-white px-12 py-5 rounded-[2rem] font-black text-lg shadow-xl shadow-green-900/40 hover:scale-105 active:scale-95 transition-all">
            Proceed to Checkout →
        </button>
    </div>

    <script>
        const products = [
            { name: "DAP Fertilizer", price: 3500, cat: "Fertilizer", img: "https://images.unsplash.com/photo-1628352081506-83c43123ed6d?auto=format&fit=crop&q=80&w=200" },
            { name: "CAN Fertilizer", price: 2800, cat: "Fertilizer", img: "https://images.unsplash.com/photo-1585314062340-f1a5a7c9328d?auto=format&fit=crop&q=80&w=200" },
            { name: "Hybrid Maize H614", price: 1200, cat: "Seeds", img: "https://images.unsplash.com/photo-1551730459-92db2a308d6a?auto=format&fit=crop&q=80&w=200" },
            { name: "Bean Seeds", price: 450, cat: "Seeds", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&q=80&w=200" },
            { name: "Knapsack Sprayer", price: 4500, cat: "Tools", img: "https://images.unsplash.com/photo-1590682846403-53ee018556ee?auto=format&fit=crop&q=80&w=200" },
            { name: "Steel Jembe", price: 850, cat: "Tools", img: "https://images.unsplash.com/photo-1615678815958-5910c6811c25?auto=format&fit=crop&q=80&w=200" },
            { name: "Solar Lamp S30", price: 1500, cat: "Equipment", img: "https://images.unsplash.com/photo-1542332213-31f87348057f?auto=format&fit=crop&q=80&w=200" },
            { name: "Chicken Feed", price: 2900, cat: "Animal", img: "https://images.unsplash.com/photo-1516467508483-a7212febe31a?auto=format&fit=crop&q=80&w=200" }
        ];

        window.onload = () => {
            renderProducts();
            
            // Session Persistence
            const farmer = localStorage.getItem('activeFarmer') || "Guest Farmer";
            document.getElementById('activeFarmerName').innerText = farmer;
            
            // Visual Star Customer Check
            if(farmer === "John Doe") {
                const indicator = document.getElementById('starIndicator');
                indicator.innerText = "⭐";
                indicator.classList.remove('bg-brand');
                indicator.classList.add('bg-yellow-400');
            }
        };

        function renderProducts() {
            const grid = document.getElementById('gridView');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white p-5 rounded-[2.5rem] flex flex-col h-full">
                    <div class="relative mb-4">
                        <img src="${p.img}" class="w-full h-32 object-cover rounded-[1.5rem]">
                        <span class="absolute top-2 right-2 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[8px] font-black text-brand uppercase">${p.cat}</span>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <h3 class="text-sm font-bold text-gray-800 leading-tight mb-4">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[9px] text-gray-400 font-bold uppercase">Price</p>
                                <p class="text-sm font-black text-gray-900">KES ${p.price.toLocaleString()}</p>
                            </div>
                            <button onclick="addToCart(${p.price})" class="bg-gray-900 text-white w-10 h-10 rounded-xl font-black hover:bg-brand transition-all active:scale-90">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        let cartTotal = 0;
        let cartCount = 0;

        function addToCart(price) {
            cartCount++;
            cartTotal += price;
            
            const bar = document.getElementById('cartBar');
            bar.classList.add('cart-show');
            
            document.getElementById('cartBadge').innerText = cartCount;
            document.getElementById('cartTotalDisplay').innerText = `KES ${cartTotal.toLocaleString()}`;
            localStorage.setItem('checkoutTotal', cartTotal);
        }
    </script>
</body>
</html>
