<main class="flex-1 overflow-y-auto p-12">
    <header class="flex justify-between items-start mb-12">
        <div>
            <h1 class="text-4xl font-black text-gray-900 tracking-tight">Habari, Alex</h1>
            <p class="text-gray-500 font-medium text-lg mt-1 italic">"Let us impact a farmer today!"</p>
        </div>
        <div class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-gray-100 flex items-center">
            <span class="text-xs font-bold text-gray-400 mr-2 uppercase">Status:</span>
            <span class="text-xs font-black text-green-600 uppercase">Shop Online</span>
        </div>
    </header>

    <section class="mb-12">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-1 bg-white rounded-[3rem] shadow-sm border border-gray-100 p-8">
                <h3 class="font-black text-gray-800 uppercase text-xs tracking-widest mb-6 text-center">Find Existing Farmer</h3>
                <div class="relative mb-6">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl">🔍</span>
                    <input type="text" id="customerSearch" placeholder="Search name or phone..." 
                        class="w-full bg-gray-50 border-2 border-transparent focus:border-brand focus:bg-white outline-none rounded-2xl py-4 pl-12 pr-4 text-sm font-bold transition-all">
                </div>

                <div id="searchResult" class="hidden animate-in fade-in duration-500">
                    <div class="bg-emerald-50 border border-emerald-100 rounded-3xl p-6 relative">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-brand rounded-2xl flex items-center justify-center text-white font-black" id="resInitials">JD</div>
                            <div>
                                <p class="text-sm font-black text-gray-900" id="resName">John Doe</p>
                                <p class="text-[10px] text-gray-500 font-bold" id="resPhone">0712 345 678</p>
                            </div>
                        </div>
                        <div id="starBadge" class="mt-4 flex items-center space-x-2 bg-white/80 backdrop-blur-sm px-3 py-2 rounded-xl w-fit border border-yellow-200">
                            <span class="text-lg">⭐</span>
                            <span class="text-[10px] font-black text-yellow-700 uppercase tracking-tighter">Star Customer (10+ Sales)</span>
                        </div>
                        <button onclick="selectCustomer()" class="w-full mt-4 bg-brand text-white py-3 rounded-xl font-black text-xs hover:opacity-90 transition-all">
                            Select for Sale
                        </button>
                    </div>
                </div>
                <div id="noResult" class="text-center py-8">
                    <p class="text-xs font-bold text-gray-400 italic">Type "John" to test search...</p>
                </div>
            </div>

            <div class="xl:col-span-2 bg-white rounded-[3rem] shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-8 border-b border-gray-50 bg-gray-50/30">
                    <h3 class="font-black text-gray-800 uppercase text-xs tracking-widest">Register New Farmer</h3>
                </div>
                <form id="regForm" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="fname" placeholder="First Name" required class="bg-gray-50 border-2 border-transparent focus:border-brand focus:bg-white outline-none rounded-2xl p-4 text-sm font-bold transition-all">
                    <input type="text" id="lname" placeholder="Last Name" required class="bg-gray-50 border-2 border-transparent focus:border-brand focus:bg-white outline-none rounded-2xl p-4 text-sm font-bold transition-all">
                    <input type="tel" id="phone" placeholder="Phone Number" required class="bg-gray-50 border-2 border-transparent focus:border-brand focus:bg-white outline-none rounded-2xl p-4 text-sm font-bold transition-all">
                    <input type="text" placeholder="Location (Optional)" class="bg-gray-50 border-2 border-transparent focus:border-brand focus:bg-white outline-none rounded-2xl p-4 text-sm font-bold transition-all">
                    
                    <div class="md:col-span-2 flex items-center justify-between mt-4">
                        <div class="text-[10px] font-black text-gray-400 uppercase">Gender (Opt): 
                            <button type="button" class="ml-2 px-3 py-1 bg-white border rounded-lg text-brand">Male</button>
                            <button type="button" class="ml-1 px-3 py-1 hover:bg-white rounded-lg">Female</button>
                        </div>
                        <button type="submit" class="bg-brand text-white px-10 py-4 rounded-2xl font-black text-sm shadow-xl shadow-green-900/20 hover:scale-105 transition-all">
                            💾 Save & Start Sale
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>

<script>
    const mockCustomers = [{ name: "John Doe", phone: "0712345678", purchases: 15 }];

    document.getElementById('customerSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const found = mockCustomers.find(c => c.name.toLowerCase().includes(query));
        const resDiv = document.getElementById('searchResult');
        const noRes = document.getElementById('noResult');
        
        if (query.length > 2 && found) {
            resDiv.classList.remove('hidden');
            noRes.classList.add('hidden');
            document.getElementById('resName').innerText = found.name;
            localStorage.setItem('activeFarmer', found.name); // Store for next page
        } else {
            resDiv.classList.add('hidden');
            noRes.classList.remove('hidden');
        }
    });

    document.getElementById('regForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const fullName = document.getElementById('fname').value + " " + document.getElementById('lname').value;
        localStorage.setItem('activeFarmer', fullName);
        window.location.href = 'products.html';
    });

    function selectCustomer() {
        window.location.href = 'products.html';
    }
</script>
